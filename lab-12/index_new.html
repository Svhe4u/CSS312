<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce App - Lab 12</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #1e88e5;
            --secondary-blue: #2196f3;
            --accent-green: #4caf50;
            --light-gray: #f5f5f5;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --border: #e0e0e0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--light-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone-container {
            width: 360px;
            height: 720px;
            background: white;
            border-radius: 40px;
            border: 12px solid #1a1a1a;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .phone-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            padding-bottom: 80px;
        }

        .page {
            display: none;
            min-height: 100%;
            padding: 20px;
            animation: fadeIn 0.3s ease-in;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* PAGE 1: MARKETPLACE */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .header-icon {
            font-size: 24px;
            cursor: pointer;
        }

        .search-bar {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
            background: var(--light-gray);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 20px 0 15px 0;
        }

        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            padding: 12px;
            box-shadow: var(--shadow);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .product-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .product-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-blue);
        }

        /* PAGE 2: LOGIN */
        .login-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-bottom: 100px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }

        .login-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .login-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Sora', sans-serif;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Sora', sans-serif;
        }

        .btn-primary {
            background: var(--primary-blue);
            color: white;
            margin-bottom: 10px;
        }

        .btn-primary:hover {
            background: #1565c0;
        }

        .btn-secondary {
            background: var(--light-gray);
            color: var(--primary-blue);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .toggle-form {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 20px;
        }

        .toggle-form a {
            color: var(--primary-blue);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .hidden-form {
            display: none;
        }

        /* PAGE 3: PAYMENT */
        .payment-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 100px;
        }

        .payment-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .card-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
        }

        .card-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .card-number-display {
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .card-details {
            display: flex;
            justify-content: space-between;
        }

        .card-holder {
            font-size: 12px;
        }

        .card-expiry {
            font-size: 12px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .order-summary {
            background: var(--light-gray);
            padding: 15px;
            border-radius: 10px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .summary-item.total {
            border-top: 1px solid var(--border);
            padding-top: 8px;
            font-weight: 700;
            color: var(--primary-blue);
        }

        .status-message {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            margin: 10px 0;
            display: none;
        }

        .status-message.success {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .status-message.error {
            background: #ffcdd2;
            color: #c62828;
        }

        .status-message.show {
            display: block;
        }

        /* NAVIGATION */
        .nav-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: white;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .nav-dots {
            display: flex;
            gap: 8px;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-dot.active {
            background: var(--primary-blue);
            width: 24px;
            border-radius: 4px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: var(--light-gray);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: var(--primary-blue);
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* SCROLLBAR STYLING */
        .phone-content::-webkit-scrollbar {
            width: 4px;
        }

        .phone-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .phone-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-content">
            <!-- PAGE 1: MARKETPLACE -->
            <div class="page active" id="page-marketplace">
                <div class="header">
                    <div class="header-title">Featured</div>
                    <div class="header-icon">🔔</div>
                </div>
                <input type="text" class="search-bar" placeholder="Search products...">
                
                <div class="section-title">Featured</div>
                <div class="products-grid" id="featured-products">
                    <!-- Loaded from API -->
                </div>

                <div class="section-title">Best Seller</div>
                <div class="products-grid" id="bestseller-products">
                    <!-- Loaded from API -->
                </div>
            </div>

            <!-- PAGE 2: LOGIN -->
            <div class="page" id="page-login">
                <div class="login-container">
                    <div class="logo">❤️</div>
                    <h2 class="login-title">Company</h2>
                    <p class="login-subtitle">Welcome to our store</p>

                    <form id="login-form" style="width: 100%;">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Sign In</button>
                    </form>

                    <form id="signup-form" style="width: 100%; display: none;">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" placeholder="Your name" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Sign Up</button>
                    </form>

                    <div class="toggle-form">
                        <span id="toggle-text">Don't have account? <a onclick="toggleAuthForm()">Sign Up</a></span>
                    </div>
                </div>
            </div>

            <!-- PAGE 3: PAYMENT -->
            <div class="page" id="page-payment">
                <div class="payment-container">
                    <h2 class="payment-title">Payment Details</h2>

                    <div class="card-display">
                        <div class="card-label">CARD NUMBER</div>
                        <div class="card-number-display" id="card-display">•••• •••• •••• 1234</div>
                        <div class="card-details">
                            <div class="card-holder">
                                <div style="font-size: 10px; opacity: 0.9;">CARD HOLDER</div>
                                <div id="holder-display">John Doe</div>
                            </div>
                            <div class="card-expiry">
                                <div style="font-size: 10px; opacity: 0.9;">EXPIRES</div>
                                <div id="expiry-display">12/28</div>
                            </div>
                        </div>
                    </div>

                    <h3 style="font-size: 14px; font-weight: 600; margin-top: 20px;">Add Card Details</h3>
                    <form id="payment-form">
                        <div class="form-group">
                            <label>Card Number</label>
                            <input type="text" id="card-number" placeholder="1234 5678 9012 3456" required>
                        </div>
                        <div class="form-group">
                            <label>Card Holder</label>
                            <input type="text" id="card-holder" placeholder="John Doe" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Expiry</label>
                                <input type="text" id="card-expiry" placeholder="MM/YY" required>
                            </div>
                            <div class="form-group">
                                <label>CVV</label>
                                <input type="text" id="card-cvv" placeholder="123" required>
                            </div>
                        </div>
                    </form>

                    <div class="order-summary">
                        <div class="summary-item">
                            <span>Subtotal</span>
                            <span id="subtotal">$150.00</span>
                        </div>
                        <div class="summary-item">
                            <span>Shipping</span>
                            <span id="shipping">$10.00</span>
                        </div>
                        <div class="summary-item">
                            <span>Tax</span>
                            <span id="tax">$12.80</span>
                        </div>
                        <div class="summary-item total">
                            <span>Total</span>
                            <span id="total">$172.80</span>
                        </div>
                    </div>

                    <div id="status-message" class="status-message"></div>
                    <button class="btn btn-primary" onclick="processPayment()">Complete Payment</button>
                </div>
            </div>
        </div>

        <!-- NAVIGATION -->
        <div class="nav-container">
            <div class="nav-dots">
                <div class="nav-dot active" onclick="goToPage(0)"></div>
                <div class="nav-dot" onclick="goToPage(1)"></div>
                <div class="nav-dot" onclick="goToPage(2)"></div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" onclick="prevPage()">←</button>
                <button class="nav-btn" onclick="nextPage()">→</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
